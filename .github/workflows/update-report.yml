name: 📊 自动更新股票报告

on:
  # 定时运行：每个工作日（周一~周五）北京时间 15:35 收盘后自动运行
  schedule:
    - cron: '35 7 * * 1-5'  # UTC 7:35 = 北京时间 15:35
  # 也可以手动触发
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-report:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: 🐍 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 安装中文字体 + Python依赖
        run: |
          sudo apt-get update && sudo apt-get install -y fonts-noto-cjk
          pip install akshare pandas matplotlib numpy scikit-learn
          # 清除 matplotlib 字体缓存，让它识别新字体
          python -c "import matplotlib; import shutil; shutil.rmtree(matplotlib.get_cachedir(), ignore_errors=True); print('✅ 字体缓存已清除')"

      - name: 🔄 运行完整工作流
        run: |
          python run_workflow.py
        env:
          MPLBACKEND: Agg

      - name: 📋 复制报告到根目录
        run: |
          cp output/report.html index.html
          cp output/report.html report.html
          cp output/*.png . 2>/dev/null || true

      - name: 🚀 提交并推送更新
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "📊 自动更新报告 $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M')"
          git push
